name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ciomart_flutter/**'
      - '.github/workflows/deploy.yml'

# Grant permissions to write content (needed for JamesIves/github-pages-deploy-action)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd ciomart_flutter
          flutter pub get

      - name: Build Flutter Web
        run: |
          cd ciomart_flutter
          flutter build web --base-href "/Ciomart/" --release

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ciomart_flutter/build/web
          branch: gh-pages
